server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compressão ────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml image/svg+xml;

    # ── SPA fallback — todas as rotas servem index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets estáticos com cache longo ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp|avif)$ {
        expires            1y;
        add_header Cache-Control "public, immutable";
        access_log         off;
    }

    # ── Proxy para o backend API (produção) ───────────────────────────────
    # Descomente e ajuste caso o frontend Nginx precise fazer proxy da API.
    # location /api/ {
    #     proxy_pass         http://api:80/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    # ── Segurança ─────────────────────────────────────────────────────────
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";

    location ~ /\. {
        deny all;
    }
}
