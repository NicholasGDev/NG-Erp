# =============================================================================
# docker-compose.dev.yml — ngErp DEV
# =============================================================================
name: ngerp-dev

services:

  # ── Aplicacao PHP-FPM ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        USER_ID:  "${UID:-1000}"
        GROUP_ID: "${GID:-1000}"
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor
    networks:
      - app-network
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV:      local
      APP_DEBUG:    "true"
      XDEBUG_MODE:  develop,debug,coverage
      XDEBUG_CLIENT_HOST: "${XDEBUG_CLIENT_HOST:-host.docker.internal}"
      XDEBUG_CLIENT_PORT: "${XDEBUG_CLIENT_PORT:-9003}"

  # ── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - app

  pgsql:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       "${DB_DATABASE:-ngerp}"
      POSTGRES_USER:     "${DB_USERNAME:-ngerp}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    ports:
      - "${FORWARD_DB_PGSQL_PORT:-5432}:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ngerp} -d ${DB_DATABASE:-ngerp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-secret_redis}"]
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-secret_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${FORWARD_MAILPIT_PORT:-8025}:8025"
      - "${FORWARD_MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  vendor_cache:
  pgsql_data:
  redis_data:
