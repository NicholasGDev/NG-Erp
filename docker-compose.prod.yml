# =============================================================================
# docker-compose.prod.yml — ngErp PROD
# ATENCAO: nunca commitar .env de producao!
# =============================================================================
name: ngerp-prod

services:

  # ── Aplicacao (PHP-FPM + Nginx via supervisor) ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV:   production
      APP_DEBUG: "false"
    deploy:
      resources:
        limits:
          cpus:   "2"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Horizon (queue worker) ───────────────────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    command: ["php", "artisan", "horizon"]
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV:   production
      APP_DEBUG: "false"

  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_DATABASE:      "${DB_DATABASE}"
      MYSQL_USER:          "${DB_USERNAME}"
      MYSQL_PASSWORD:      "${DB_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.4-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
